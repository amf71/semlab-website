{{ define "main" }}
<section class="page-head">
  <div class="decor decor--fish" data-decor="fishplot" data-seed="21" aria-hidden="true"></div>
  <div class="wrap">
    <p class="eyebrow">{{ with .Params.eyebrow }}{{ . }}{{ else }}{{ .Site.Params.labName }}{{ end }}</p>
    <h1>{{ .Title }}</h1>
    {{ with .Params.kicker }}<p class="kicker">{{ . }}</p>{{ end }}
  </div>
</section>
<section>
  <div class="wrap">
    <div class="prose">
      {{ .Content }}
    </div>
  </div>
</section>
{{ end }}
