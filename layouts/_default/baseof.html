<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en-gb" }}">
{{ partial "head.html" . }}
<body>
  {{ partial "header.html" . }}
  <main id="main">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  {{ $decor := resources.Get "js/sem-decor.js" | fingerprint }}
  <script defer src="{{ $decor.RelPermalink }}" integrity="{{ $decor.Data.Integrity }}"></script>
  {{ $lightbox := resources.Get "js/lightbox.js" | fingerprint }}
  <script defer src="{{ $lightbox.RelPermalink }}" integrity="{{ $lightbox.Data.Integrity }}"></script>
  <script>
    // Mobile nav toggle
    const t = document.querySelector('.nav-toggle');
    const l = document.querySelector('.nav-links');
    if (t && l) t.addEventListener('click', () => {
      const open = l.classList.toggle('open');
      t.setAttribute('aria-expanded', open);
    });
  </script>
</body>
</html>
