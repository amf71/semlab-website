{{ define "main" }}
<section class="page-head">
  <div class="wrap">
    <p class="eyebrow">In pictures</p>
    <h1>{{ .Title }}</h1>
    {{ with .Params.kicker }}<p class="kicker">{{ . }}</p>{{ end }}
  </div>
</section>

<section>
  <div class="wrap">
    <div class="gallery-grid">
      {{ range .Site.Data.gallery.items }}
      <figure class="gallery-item">
        {{ if and .image (fileExists (printf "static/images/gallery/%s" .image)) }}
          <img src="{{ printf "/images/gallery/%s" .image | relURL }}" alt="{{ .caption }}" loading="lazy">
        {{ else }}
          <figcaption class="cap">{{ .caption }} — add {{ .image }}</figcaption>
        {{ end }}
      </figure>
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
