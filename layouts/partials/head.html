<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {{ $title := .Title }}{{ $site := .Site.Title }}
  <title>{{ if .IsHome }}{{ $site }} — {{ .Site.Params.tagline }}{{ else }}{{ $title }} · {{ $site }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.institution }}. {{ .Site.Params.tagline }}.{{ end }}">

  <!-- Open Graph -->
  <meta property="og:title" content="{{ if .IsHome }}{{ $site }}{{ else }}{{ $title }} · {{ $site }}{{ end }}">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="{{ $site }}">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Stylesheet (fingerprinted for cache-busting) -->
  {{ $css := resources.Get "css/main.css" | fingerprint }}
  <link rel="stylesheet" href="{{ $css.RelPermalink }}" integrity="{{ $css.Data.Integrity }}">

  <link rel="icon" href="/images/favicon.svg" type="image/svg+xml">
</head>
