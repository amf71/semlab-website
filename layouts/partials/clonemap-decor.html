{{/* cloneMap page-header decoration.
     Params: img (filename in static/images/decor/), side ("right" | "left").
     Inert, atmospheric backdrop — recoloured real cloneMaps from the lab. */}}
{{ $img := .img }}
{{ $side := .side | default "right" }}
<div class="decor decor--clone-img decor--{{ $side }}" aria-hidden="true">
  <img src="{{ printf "/images/decor/%s" $img | relURL }}" alt="" loading="lazy" decoding="async">
</div>
