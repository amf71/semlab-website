<header class="site-header">
  <div class="wrap nav">
    <a class="brand" href="{{ "/" | relURL }}">
      {{ if fileExists "static/images/logo.png" }}<img class="brand-mark" src="{{ "/images/logo.png" | relURL }}" alt="">{{ end }}
      <span>{{ .Site.Params.labName }}</span>
    </a>
    <button class="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links">
      {{ $current := . }}
      {{ range .Site.Menus.main }}
        {{ $active := or ($current.IsMenuCurrent "main" .) ($current.HasMenuCurrent "main" .) }}
        <li><a href="{{ .URL }}"{{ if $active }} aria-current="true"{{ end }}>{{ .Name }}</a></li>
      {{ end }}
    </ul>
  </div>
</header>
