themes:
  - title: "Clonal dynamics"
    summary: "Quantifying how mutant clones expand, compete and are purified by selection in healthy and pre-cancerous tissue over a lifetime."
  - title: "Mutation & selection"
    summary: "Inferring mutation rates and selection coefficients from deep sequencing to distinguish drivers from passengers in early lesions."
  - title: "Phylogenetic reconstruction"
    summary: "Building single-cell and bulk phylogenies to reconstruct the evolutionary history of a tissue from its somatic mutations."

