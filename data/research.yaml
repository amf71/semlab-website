# ------------------------------------------------------------
#  Research themes shown on the homepage (the lab's three aims).
#  Add / remove / reorder freely.
# ------------------------------------------------------------
themes:
  - title: "Longitudinal, non-invasive tracking"
    summary: "Holistically tracking the longitudinal dynamics of somatic evolution using non-invasive samples such as circulating tumour DNA, so cancer clones can be followed over space and time."
  - title: "Somatic evolution & carcinogenesis"
    summary: "Understanding somatic evolution and carcinogenesis from detailed snapshots of tissue biopsies — reconstructing how competing clones initiate, progress and metastasise."
  - title: "Clinical biomarkers"
    summary: "Developing clinical biomarkers to predict and detect high-risk somatic evolution, translating evolutionary measurements into tools for early detection and prevention."

