# ------------------------------------------------------------
#  Institution & funders.
#  `institution` logos are shown large and in full colour (our home).
#  `logos` are the smaller funder/partner strip.
#  `names` lists all funders as text (for those without a logo).
#  Image files live in static/images/funders/.
# ------------------------------------------------------------
institution:
  - name: "University of Cambridge"
    image: "cambridge-lockup.png"
    url: "https://www.cam.ac.uk/"
  - name: "Early Cancer Institute"
    icon: "eci-icon2.png"
    text: "Early Cancer<br>Institute"
    url: "https://www.earlycancer.cam.ac.uk/"
  - name: "Cancer Research UK Cambridge Centre"
    image: "crukcc-logo.png"
    url: "https://www.cruk.cam.ac.uk/"

logos:
  - name: "The Francis Crick Institute"
    image: "crick.png"

names:
  - "Wellcome Trust"
  - "Cancer Research UK"
  - "Academy of Medical Sciences"
  - "Downing College, Cambridge"
  - "The Cowan Foundation"
  - "NIHR Cambridge Biomedical Research Centre"
