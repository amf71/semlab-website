# ------------------------------------------------------------
#  Open-source software tools developed in the lab.
#  Rendered by layouts/software/list.html.
#  Per tool: name, tagline, description, repo (URL), lang (optional),
#  author (optional). Order = display order.
# ------------------------------------------------------------
org: "https://github.com/Somatic-Evolutionary-Monitoring-Lab"

tools:
  - name: "cloneMap"
    tagline: "Visualising clonal heterogeneity"
    description: "Creates visual representations of clonal heterogeneity within and across samples of an individual tumour, while preserving the underlying phylogenetic information. A compact way to see how subclones are distributed across regions and time."
    repo: "https://github.com/amf71/cloneMap"
    lang: "R"
    author: "Developed by Alex Frankell"

  - name: "ECLIPSE"
    tagline: "Subclonal dynamics from ctDNA"
    description: "Tracks tumour subclonal dynamics from low-fraction circulating tumour DNA (ctDNA), leveraging data from at least one matched tissue sample. Enables non-invasive, longitudinal reconstruction of how clones rise and fall under treatment."
    repo: "https://github.com/amf71/ECLIPSE"
    lang: "R"
    author: "Developed by Alex Frankell"

  - name: "ParallelGDDetect"
    tagline: "Deconvolving whole-genome doubling"
    description: "Deconvolves multiple subclonal whole-genome doubling (WGD) events within a single tumour from multiregional tissue sequencing. Parallel WGD events were unexpectedly found in ~20% of non-small cell lung tumours in TRACERx."
    repo: "https://github.com/amf71/ParallelGDDetect"
    lang: "R"
    author: "Developed by Alex Frankell"

  - name: "AstroCNA"
    tagline: "Allele-specific CNAs in low-purity samples"
    description: "Allele-Specific Tumour-Only detection of Copy Number Aberration. Detects chromosomal instability in low-purity, non-invasive samples — resolving allele-specific copy-number changes down to ~1% tumour fraction from shallow whole-genome sequencing, with no matched normal required."
    repo: "https://github.com/Somatic-Evolutionary-Monitoring-Lab"
    lang: "R"
    author: "Developed by Woody Zhang"
