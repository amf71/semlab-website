  - name: "Janhavi Rastogi"
    role: "Research Assistant"
    group: "Research Assistants & Staff"
    photo: "janhavi-rastogi.jpg"
    blurb: "Janhavi received her M.Sc. in Biomedical Science from the University of Bristol, where her final-year research focused on cell synchronisation in osteoarthritis. She then joined the CRUK Manchester Institute, investigating circulating tumour cells (CTCs) as biomarkers for cancer detection in Prof Caroline Dive's Laboratory. Since joining the Frankell Lab in January 2026, her research has focused on advancing early cancer detection through the longitudinal analysis of circulating tumour DNA (ctDNA), with the aim of improving our understanding of tumour evolution and disease monitoring."

