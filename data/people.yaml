# ------------------------------------------------------------
#  Lab members. `group` must match one of the headings in
#  layouts/people/list.html:
#    Principal Investigator | Postdoctoral Researchers |
#    PhD Students | Research Assistants & Staff | Team | Alumni
#
#  Optional per person: photo (file in static/images/people/),
#  blurb, email, scholar, github.
#
#  NOTE: roles marked "Team member" below need confirming, and most
#  members still need a short blurb and a headshot (drop a JPG into
#  static/images/people/ and set `photo:`). Alex & Emma are complete.
# ------------------------------------------------------------
members:
  - name: "Alex Frankell"
    role: "Group Leader · Assistant Professor"
    group: "Principal Investigator"
    photo: "alex-frankell.jpg"
    blurb: "Alex leads the Somatic Evolution Monitoring Lab at the Early Cancer Institute. He combines computational and experimental methods to track cancer evolution across space and time — spanning oesophageal and lung cancer (including TRACERx) and non-invasive ctDNA approaches — and developed methods including cloneMap, ECLIPSE and ParallelGDDetect. He holds a Wellcome Career Development Award."
    email: "amf71@cam.ac.uk"
    scholar: "https://scholar.google.com/citations?user=2xS5m4gAAAAJ&hl=en"

  - name: "Emma Hazelwood"
    role: "Postdoctoral Research Fellow in Cancer Evolution"
    group: "Postdoctoral Researchers"
    photo: "emma-hazelwood.jpg"
    blurb: "Emma joined the lab as a postdoc after completing her PhD in Cancer Epidemiology at the University of Bristol in 2024. She develops spatial DNA sequencing technologies and contributes to the TRACERx lung cancer project, focusing on germline analyses. She also holds the Everitt Butterfield Research Fellowship at Downing College. Outside the lab she enjoys live music and pub quizzes."

  - name: "Lianlian (Leanne) Wu"
