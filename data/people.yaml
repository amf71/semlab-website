# ------------------------------------------------------------
#  Lab members. The page has two sections, Current and Alumni.
#  Section is set per person by `status`:
#    status: alumni  -> Alumni section (omit for current members)
#  Within each section people are ordered by seniority using `group`
#  (see $roleOrder in layouts/people/list.html):
#    Principal Investigator | Postdoctoral Researchers |
#    PhD Students | Research Assistants & Staff | Team
#
#  Optional per person: photo (file in static/images/people/),
#  blurb, email, scholar, github.
#
#  NOTE: roles marked "Team member" below need confirming, and most
#  members still need a short blurb and a headshot (drop a JPG into
#  static/images/people/ and set `photo:`). Alex & Emma are complete.
# ------------------------------------------------------------
members:
  - name: "Alex Frankell"
    role: "Group Leader · Assistant Professor"
    group: "Principal Investigator"
    photo: "alex-frankell.jpg"
    blurb: "Alex leads the Somatic Evolution Monitoring Lab at the Early Cancer Institute. He completed his PhD at the MRC Cancer Unit, University of Cambridge, where he led whole-genome sequencing analysis in the Oesophageal ICGC project and followed up his findings in plasma circulating tumour DNA. He then undertook a postdoctoral fellowship at UCL and the Francis Crick Institute as part of the TRACERx study, using multiregional sequencing and longitudinal plasma sampling to uncover novel patterns of clonal evolution and biomarkers in non-small cell lung cancer. He has since developed multiple novel methods and intellectual property, including computational and experimental approaches to track cancer evolution across space and time — such as cloneMap, ECLIPSE and ParallelGDDetect. He holds an 8 year, £2.6M Wellcome Career Development Award alongside several other project grants which support the lab's work."
    email: "amf71@cam.ac.uk"
    scholar: "https://scholar.google.com/citations?user=2xS5m4gAAAAJ&hl=en"

  - name: "Emma Hazelwood"
    role: "Postdoctoral Research Fellow in Cancer Evolution"
    group: "Postdoctoral Researchers"
    photo: "emma-hazelwood.jpg"
    blurb: "Emma joined the lab as a postdoc, after completing her PhD in Cancer Epidemiology at the University of Bristol in 2024. Emma now works on developing spatial DNA sequencing technologies and contributing to the TRACERx lung cancer project, focussing on germline analyses. Alongside her position in the Frankell lab, Emma also holds the Everitt Butterfield Research Fellowship at Downing College. Outside of work, she enjoys watching live music and participating in pub quizzes."

  - name: "Lianlian (Leanne) Wu"
    role: "Postdoctoral Researcher"
    group: "Postdoctoral Researchers"
    blurb: ""

  - name: "Zhidong (Woody) Zhang"
    role: "PhD Student"
    group: "PhD Students"
    photo: "woody-zhang.jpg"
    blurb: "Woody studied computational biology at Sichuan University before completing an MPhil in Chemical Pathology with Professor Dennis Lo at the Chinese University of Hong Kong, where he studied cell-free DNA biology and its applications in non-invasive prenatal and cancer testing. He joined the Frankell lab as a PhD student in 2024. His research focuses on developing sensitive computational genomics methods to detect chromosomal instability and track tumour evolution in non-invasive samples, including circulating tumour DNA and capsule sponges. He applies these methods to some of the most lethal cancers, including lung and oesophageal cancers, with the aim of improving early detection and risk stratification. Outside the lab, Woody enjoys football, hiking and photography."

