  - name: "Fabiola (Fabi) Roman Maldonado"
    role: "Senior Research Technician in NGS"
    group: "Research Assistants & Staff"
    photo: "fabiola-roman-maldonado.jpg"
    blurb: "Fabi has an MSc and PhD in Parasitology from FIOCRUZ, Brazil, where her work focused on the genetic diversity of the parasite that causes Chagas disease in South America. In 2020 she joined the Sanger Institute in Sequencing Operations, working on library preparation for the Tree of Life project using PacBio and Illumina platforms, and also developed expertise in Hi-C processing of ultra-low input samples. She joined the Frankell lab to focus on duplex sequencing and is also driving the development of spatial genomics techniques."

  - name: "Hannah Bazin"
