# ============================================================
#  Site configuration
#  Most things you'll want to change day-to-day live in the
#  [params] block below, or in the data/ and content/ folders.
# ============================================================

baseURL = "https://frankell-lab.com/"      # <-- change to your final domain
languageCode = "en-gb"
title = "SEM Lab"                        # browser tab / SEO title
enableRobotsTXT = true

# Pretty, trailing-slash URLs (e.g. /research/ not /research.html)
[permalinks]
  news = "/news/:slug/"

[params]
  # ---- Identity -------------------------------------------------
  labName      = "SEM Lab"                              # shown in the nav
  labFullName  = "Somatic Evolution Monitoring Lab"       # shown in the footer
  tagline      = "tracking cancer evolution before it begins"
  subtitle     = "Tech & Methods Development · Evolutionary Dynamics · Non‑invasive Biomarkers"
  institution  = "Early Cancer Institute, University of Cambridge"
  email        = "amf71@cam.ac.uk"
  # ---- Social / external links (leave blank to hide) ------------
  twitter      = ""
  scholar      = "https://scholar.google.com/citations?user=2xS5m4gAAAAJ&hl=en"
  pubmed       = "https://pubmed.ncbi.nlm.nih.gov/?term=Alexander+M+Frankell&sort=date&size=200#"
  github       = "https://github.com/Somatic-Evolutionary-Monitoring-Lab"
  bluesky      = ""

# ---- Top navigation (order set by weight) ---------------------
[menu]
  [[menu.main]]
    name = "Home"
    pageRef = "/"
    weight = 5
  [[menu.main]]
    name = "Research"
    pageRef = "/research"
    weight = 10
  [[menu.main]]
    name = "Publications"
    pageRef = "/publications"
    weight = 20
  [[menu.main]]
    name = "Software"
    pageRef = "/software"
    weight = 25
  [[menu.main]]
    name = "People"
    pageRef = "/people"
    weight = 30
  [[menu.main]]
    name = "Opportunities"
    pageRef = "/opportunities"
    weight = 40
  [[menu.main]]
    name = "News"
    pageRef = "/news"
    weight = 50
  [[menu.main]]
    name = "Gallery"
    pageRef = "/gallery"
    weight = 60
  [[menu.main]]
    name = "Contact"
    pageRef = "/contact"
    weight = 70

[markup.goldmark.renderer]
  unsafe = true   # allow raw HTML in Markdown where needed

[build]
  writeStats = false
